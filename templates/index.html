<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdForge - Ad Copy Generator</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; }
        .container { max-width: 700px; background: white; margin: 20px auto; }
        h1 { color: #1a73e8; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        textarea, select, button { width: 100%; padding: 12px; margin-top: 5px; }
        textarea { resize: vertical; height: 100px; }
        button { background-color: #1a73e8; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #1557b0; }
        .output-box { background: #f8f9fa; border-left: 5px solid #1a73e8; padding: 10px; margin-top: 20px; display: none; white-space: pre-wrap; }
        .loading { display: none; color: #666; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Advertisement Copy Generator</h1>
<p>Generate optimized advertisement copy for your campaigns.</p>

        <label for="description">What is your post about?</label>
        <textarea id="description" placeholder="Describe your post..."></textarea>

        label for="platform">Select Advertising Platform</label>
        <select id="platform">
            <option value="Instagram">Instagram (Visual & Emojis)</option>
            <option value="LinkedIn">LinkedIn (Professional & Networking)</option>
            <option value="Twitter/X">Twitter/X (Short & Punchy)</option>
        </select>

        <label for="tone">Select Content Tone</label>
        <select id="tone">
            <option value="Casual">Casual</option>
            <option value="Professional">Professional</option>
            <option value="Promotional">Promotional / Urgent</option>
        </select>

        <button onclick="generateContent()">Generate Marketing Content</button>

        <div id="loadingText" class="loading">Processing with Llama AI...</div>
        <div id="resultBox" class="output-box"></div>
    </div>

    <script>
        async function generateContent() {
            const description = document.getElementById('description').value;
            const platform = document.getElementById('platform').value;
            const tone = document.getElementById('tone').value;
            const resultBox = document.getElementById('resultBox');
            const loadingText = document.getElementById('loadingText');

            if (!description.trim()) {
                alert('Please provide a post description first!');
                return;
            }

            loadingText.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description, platform, tone })
                });
                const data = await response.json();

                loadingText.style.display = 'none';
                if (data.success) {
                    resultBox.innerText = data.result;
                    resultBox.style.display = 'block';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                loadingText.style.display = 'none';
                alert('Failed to contact local Flask server');
            }
        }
    </script>
</body>
</html>
