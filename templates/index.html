[1:29 am, 29/06/2026] Rudra: <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AdForge AI</title>
    <!-- Bootstrap CSS Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h1 class="text-primary text-center">AdForge AI</h1>
            <p class="text-center">Apne product ka naam likhein aur ad copy generate karein.</p>
<form id="adForm" onsubmit="event.preventDefault();"> 
        <div class="mb-3">
            <label>Product Name:</label>
            <input type="text" id="product" name="product" class="form-control" placeholder="AdForge AI...">
        </div>

        <div class="mb-3">
    <label>Platform:</label>
    <select id="platform" name="platform" class="form-control">
        <option value="Instagram">Instagram</option>
        <option value="Facebook">Facebook</option>
        <option value="Google Ads">Google Ads</option>
    </select>
</div>

<div class="mb-3">
    <label>Tone:</label>
    <select id="tone" name="tone" class="form-control">
        <option value="Professional">Professional</option>
        <option value="Funny">Funny</option>
        <option value="Urgent">Urgent</option>
    </select>
</div>

         <button type="button" id="genBtn" onclick="generateContent()" class="btn btn-primary w-100">Generate Ad</button>
</form>
<div id="loader" style="display:none; text-align:center; padding: 20px;">
    <p>Generating your Ad Copy...</p>
</div>

 
<!-- Paste khatam -->

<div id="resultCard" style="display:none; margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h3>Generated Ad Copy:</h3>
    <p id="adText"></p> <button onclick="copyToClipboard()" class="btn btn-secondary">Copy to Clipboard</button>
</div>


<!-- JavaScript (Ise file ke bilkul niche daal dein) -->
</div> <script>
        window.onload = function() {
            window.showLoader = function() {
            document.getElementById('genBtn').disabled = true;
            document.getElementById('loader').style.display = 'block';
        };

        window.generateContent = function() {
            showLoader();
            const product = document.getElementById('product').value;
            const platform = document.getElementById('platform').value;
            const tone = document.getElementById('tone').value;

            fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product, platform, tone })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('adText').innerText = data.ad_copy;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('genBtn').disabled = false;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('genBtn').disabled = false;
            });
        };

        window.copyToClipboard = function() {
            const text = document.getElementById('adText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Ad copy copied to clipboard!");
            });
        };
            
}
    </script>
</body> 
</html>
