[1:30 am, 29/06/2026] Rudra: <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AdForge AI</title>
    <!-- Bootstrap CSS Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h1 class="text-primary text-center">AdForge AI</h1>
            <p class="text-center">Apne product ka naam likhein aur ad copy generate karein.</p>
            
            <form method="POST" action="/" class="mt-4">
                <div class="mb-3">
                    <input type="text" name="product" class="form-control" placeholder="Jaise: Running Shoes" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Generate Ad</button>
            </form>

            {% if ad_copy %}
                <div class="mt-4 p-3 bg-white border rounded">
                    <h5>AI Suggestion:</h5>
                    <p>{{ ad_copy }}</p>
                </div>
            {% endif %}
        </div>
    </div>
